<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AgriSense – Farmer Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-main: #020617;
      --bg-card: rgba(15, 23, 42, 0.9);
      --bg-card-soft: rgba(15, 23, 42, 0.7);
      --accent: #22c55e;
      --accent-soft: rgba(34, 197, 94, 0.15);
      --accent-strong: #16a34a;
      --accent-warn: #facc15;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --border-subtle: rgba(148, 163, 184, 0.25);
      --shadow-soft: 0 22px 40px rgba(15, 23, 42, 0.9);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --transition-fast: 180ms ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a 0, #020617 45%, #000 100%);
      color: var(--text-main);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 60px;
    }

    @media (min-width: 768px) {
      .page {
        padding: 28px 24px 80px;
      }
    }

    /* Background blobs */
    .blur-blob {
      position: fixed;
      width: 460px;
      height: 460px;
      border-radius: 999px;
      filter: blur(80px);
      opacity: 0.45;
      z-index: -1;
      pointer-events: none;
    }
    .blob-1 {
      background: #22c55e;
      top: -120px;
      right: -40px;
    }
    .blob-2 {
      background: #22c55e;
      bottom: -160px;
      left: -60px;
    }

    /* NAVBAR (simple) */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 18px;
      border-radius: 999px;
      background: linear-gradient(to right, rgba(15,23,42,0.94), rgba(15,23,42,0.88));
      border: 1px solid rgba(148,163,184,0.35);
      box-shadow: 0 16px 40px rgba(15,23,42,0.9);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 14px;
      z-index: 20;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-logo {
      width: 34px;
      height: 34px;
      border-radius: 14px;
      background: radial-gradient(circle at 30% 0, #facc15, #22c55e 60%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(34, 197, 94, 0.45);
    }

    .nav-logo span {
      font-weight: 700;
      color: #022c22;
      font-size: 18px;
    }

    .nav-title-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .nav-tag {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--accent);
    }

    .nav-right button {
      border-radius: 999px;
      border: none;
      font-size: 13px;
      padding: 7px 14px;
      cursor: pointer;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: radial-gradient(circle at 0% 0%, #facc15, #22c55e);
      color: #052e16;
      box-shadow: 0 16px 30px rgba(34, 197, 94, 0.52);
      transition: transform 130ms ease, box-shadow 130ms ease;
    }

    .nav-right button span {
      font-size: 16px;
    }

    .nav-right button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 46px rgba(34, 197, 94, 0.7);
    }

    /* Centered form card */

    .center-wrap {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .form-card {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(145deg, var(--bg-card), var(--bg-card-soft));
      border-radius: var(--radius-xl);
      border: 1px solid rgba(148,163,184,0.4);
      box-shadow: var(--shadow-soft);
      padding: 22px 20px 20px;
    }

    .form-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(148,163,184,0.6);
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .form-pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(to bottom right, #facc15, #22c55e);
    }

    .form-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .form-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .field-group {
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-label {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .field-label span {
      font-size: 11px;
      color: var(--accent);
    }

    .field-input {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(15,23,42,0.96);
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text-main);
      outline: none;
    }

    .field-input::placeholder {
      color: var(--text-muted);
    }

    .btn-primary {
      width: 100%;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: radial-gradient(circle at 0% 0%, #facc15, #22c55e);
      color: #022c22;
      box-shadow: 0 20px 40px rgba(34, 197, 94, 0.7);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      margin-top: 4px;
    }

    .btn-primary span {
      font-size: 18px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 24px 60px rgba(34, 197, 94, 0.9);
    }

    .form-note {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="blur-blob blob-1"></div>
  <div class="blur-blob blob-2"></div>

  <div class="page">
    <!-- NAVBAR -->
    <header class="nav">
      <div class="nav-left">
        <div class="nav-logo"><span>Ag</span></div>
        <div class="nav-title-group">
          <div class="nav-title">AgriSense</div>
          <div class="nav-tag">Smart Agricultural Advisory</div>
        </div>
      </div>

      <div class="nav-right">
        <button onclick="goHome()">
          Back to Home
          <span>↩</span>
        </button>
      </div>
    </header>

    <!-- CENTERED LOGIN FORM -->
    <div class="center-wrap">
      <form class="form-card" id="farmerForm">
        <div class="form-pill">
          <div class="form-pill-dot"></div>
          Farmer sign up / login
        </div>

        <h1 class="form-title">Welcome, Farmer 👋</h1>
        <p class="form-subtitle">
          Enter your basic details to continue to the AgriSense advisory dashboard.
        </p>

        <div class="field-group">
          <label class="field-label">
            Full Name
            <span>Required</span>
          </label>
          <input
            type="text"
            id="name"
            class="field-input"
            placeholder="e.g. Ramesh Gowda"
            required
          />
        </div>

        <div class="field-group">
          <label class="field-label">
            Village / City
            <span>Required</span>
          </label>
          <input
            type="text"
            id="village"
            class="field-input"
            placeholder="e.g. Mandya, Hosur, Anantapur..."
            required
          />
        </div>

        <div class="field-group">
          <label class="field-label">
            Email
            <span>Required</span>
          </label>
          <input
            type="email"
            id="email"
            class="field-input"
            placeholder="e.g. farmer@example.com"
            required
          />
        </div>

        <div class="field-group">
          <label class="field-label">
            Phone Number
            <span>Required</span>
          </label>
          <input
            type="tel"
            id="phone"
            class="field-input"
            placeholder="e.g. 9876543210"
            required
          />
        </div>

        <button type="submit" class="btn-primary">
          Enter Dashboard
          <span>➜</span>
        </button>
      </form>
    </div>
  </div>

  <script>
    function goHome() {
      window.location.href = "index.html";
    }

    // Simple front-end "login"
    const form = document.getElementById("farmerForm");
    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const village = document.getElementById("village").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();

      // Store farmer details locally (for demo/session feel)
      const farmer = { name, village, email, phone };
      localStorage.setItem("agriSenseFarmer", JSON.stringify(farmer));

      alert("Welcome, " + name + "! You are now logged in.");

      // Redirect back to home page
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
